 0 1.00182 22.2861 118)">(</text></g><text font-family="Yu Gothic,Yu Gothic_MSFontService,sans-serif" font-weight="700" font-size="18.7106" transform="matrix(1 0 0 1.00182 28.1226 118)">例</text><text font-family="Calibri,Calibri_MSFontService,sans-serif" font-weight="700" font-size="18.7106" transform="matrix(1 0 0 1.00182 46.7992 118)">)</text><text font-family="Yu Gothic,Yu Gothic_MSFontService,sans-serif" font-weight="700" font-size="18.7106" transform="matrix(1 0 0 1.00182 56.8046 118)">「犬は猫よりサイズが大きいことが多い」</text></g></svg>